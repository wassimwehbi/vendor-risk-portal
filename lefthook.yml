# Local git hooks (installed by the root `prepare` script via `lefthook install`).
# Kept fast so they aren't routinely bypassed — the full suite runs in CI.

pre-commit:
  parallel: true
  commands:
    biome:
      glob: '*.{js,jsx,ts,tsx,json,jsonc,css}'
      run: npx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: npm run typecheck
