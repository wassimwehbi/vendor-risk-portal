name: ADW ZTE

# GitHub Actions stands in for a self-hosted webhook server (the corp network
# blocks inbound webhooks). It reacts to issue events / manual dispatch and runs
# the Zero-Touch Engineering pipeline inside CI.
on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to run ZTE on"
        required: true
      adw_id:
        description: "Existing ADW id (optional)"
        required: false
      dry_run:
        description: "Dry run: run the full pipeline but STOP before merging"
        type: boolean
        default: false
        required: false
  repository_dispatch:
    types: [adw-zte]

# One ZTE run per issue at a time; never cancel in progress (a kill mid-merge is
# dangerous).
concurrency:
  group: adw-zte-${{ github.event.issue.number || github.event.inputs.issue_number || github.event.client_payload.issue_number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read

jobs:
  zte:
    # Only react to TRUSTED human triggers carrying the adw label / magic string,
    # never to the bot's own comments (loop guard), and not to PR comments.
    # SECURITY (public repo): issue/comment events from arbitrary users must NOT be
    # able to launch a secret-bearing run, so we require the author to be the repo
    # owner/member/collaborator. workflow_dispatch & repository_dispatch already
    # require write access to invoke.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'issues' &&
        contains(github.event.issue.labels.*.name, 'adw:zte') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request == null &&
        !contains(github.event.comment.body, '[ADW-AGENTS]') &&
        startsWith(github.event.comment.body, 'adw') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # IMPORTANT: a non-default token (PAT / GitHub App) so the bot's pushes
          # and PRs DO trigger ci.yml / codeql.yml. The default GITHUB_TOKEN would
          # not, and the ship loop would hang waiting for checks.
          token: ${{ secrets.ADW_GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Node deps (root + server + client)
        run: npm run install:ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Install Claude Code CLI
        run: npm i -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.name  "adw-bot"
          git config user.email "adw-bot@users.noreply.github.com"

      - name: Resolve issue number + adw id
        id: ctx
        run: |
          echo "issue=${{ github.event.issue.number || github.event.inputs.issue_number || github.event.client_payload.issue_number }}" >> "$GITHUB_OUTPUT"
          echo "adw_id=${{ github.event.inputs.adw_id || github.event.client_payload.adw_id }}" >> "$GITHUB_OUTPUT"

      - name: Run ZTE
        env:
          # Subscription auth (no API key): minted locally via `claude setup-token`.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # gh + git push use the non-default token so downstream CI fires.
          GH_TOKEN: ${{ secrets.ADW_GH_TOKEN }}
          GITHUB_PAT: ${{ secrets.ADW_GH_TOKEN }}
          # Run in place on a branch (no worktree/ports) — the runner is isolated.
          ADW_IN_CI: "true"
        run: |
          uv run adws/adw_triggers/run_zte.py "${{ steps.ctx.outputs.issue }}" ${{ steps.ctx.outputs.adw_id }} ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
