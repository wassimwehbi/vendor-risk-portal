version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      root:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    groups:
      server:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    groups:
      client:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
